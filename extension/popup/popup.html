<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo - 快速记录</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        <span class="logo-text">Memo</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="settingsBtn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Login View -->
    <div id="loginView" class="view">
      <div class="login-form">
        <h2>登录 Memo</h2>
        <p class="login-hint">登录后可同步您的备忘录</p>
        
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        
        <button class="btn btn-primary btn-block" id="loginBtn">登录</button>
        
        <div class="login-footer">
          <a href="https://main.memo-app-1xs.pages.dev/login.html" target="_blank">注册账号</a>
        </div>
      </div>
    </div>

    <!-- Main View -->
    <div id="mainView" class="view" style="display: none;">
      <!-- Quick Actions -->
      <div class="quick-actions">
        <button class="action-btn" id="savePageBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/>
            <polyline points="7 3 7 8 15 8"/>
          </svg>
          <span>保存页面</span>
        </button>
        <button class="action-btn" id="quickNoteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span>快速记录</span>
        </button>
        <button class="action-btn" id="viewAllBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span>查看全部</span>
        </button>
      </div>

      <!-- Quick Note Form -->
      <div id="quickNoteForm" class="quick-note-form" style="display: none;">
        <div class="form-group">
          <input type="text" id="memoTitle" placeholder="标题（可选）">
        </div>
        <div class="form-group">
          <textarea id="memoContent" placeholder="输入内容..." rows="4"></textarea>
        </div>
        <div class="form-group">
          <input type="text" id="memoTags" placeholder="标签（逗号分隔）">
        </div>
        <div class="form-actions">
          <button class="btn btn-outline" id="cancelNoteBtn">取消</button>
          <button class="btn btn-primary" id="saveNoteBtn">保存</button>
        </div>
      </div>

      <!-- Pending Indicator -->
      <div id="pendingIndicator" class="pending-indicator" style="display: none;">
        <span class="pending-count">0</span> 条待同步
        <button class="btn-text" id="syncNowBtn">立即同步</button>
      </div>

      <!-- Recent Memos -->
      <div class="recent-section">
        <h3>最近记录</h3>
        <div id="recentMemos" class="recent-memos">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>

    <!-- Settings View -->
    <div id="settingsView" class="view" style="display: none;">
      <div class="settings-header">
        <button class="btn-icon" id="backBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h2>设置</h2>
      </div>
      
      <div class="settings-content">
        <div class="setting-item">
          <label>自动提取页面信息</label>
          <input type="checkbox" id="autoExtract" checked>
        </div>
        <div class="setting-item">
          <label>显示通知</label>
          <input type="checkbox" id="showNotification" checked>
        </div>
        <div class="setting-item">
          <label>默认笔记本</label>
          <select id="defaultNotebook">
            <option value="">不指定</option>
          </select>
        </div>
        
        <div class="settings-divider"></div>
        
        <button class="btn btn-outline btn-block" id="logoutBtn">退出登录</button>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
