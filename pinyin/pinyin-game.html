<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉语拼音学习游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5rem;
            color: #ff6b6b;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
        }

        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .tab-button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .tab-button.active {
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            color: white;
            transform: translateY(-2px);
        }

        .tab-button:not(.active) {
            background: white;
            color: #666;
        }

        .tab-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .content {
            display: none;
        }

        .content.active {
            display: block;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 3px solid transparent;
        }

        .card:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            border-color: #ff6b6b;
        }

        .card.clicked {
            animation: bounce 0.6s ease;
            background: linear-gradient(45deg, #ff6b6b, #ffa500);
            color: white;
        }

        @keyframes bounce {
            0%, 20%, 60%, 100% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-10px) scale(1.1); }
            80% { transform: translateY(-5px) scale(1.05); }
        }

        .pinyin {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .card.clicked .pinyin {
            color: white;
        }

        .example {
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }

        .card.clicked .example {
            color: #ffe6e6;
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: #666;
            margin: 50px 0;
        }

        @media (max-width: 768px) {
            .title {
                font-size: 2rem;
            }
            
            .cards-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 15px;
                padding: 15px;
            }
            
            .card {
                padding: 15px;
            }
            
            .pinyin {
                font-size: 2rem;
            }
            
            .tab-button {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .tabs {
                flex-direction: column;
                align-items: center;
            }
            
            .tab-button {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">🎵 汉语拼音学习游戏 🎵</h1>
            <p class="subtitle">点击卡片听发音，快乐学拼音！</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab('shengmu')">声母学习</button>
            <button class="tab-button" onclick="switchTab('yunmu')">韵母学习</button>
        </div>

        <div id="shengmu" class="content active">
            <div class="cards-grid" id="shengmu-grid">
                <!-- 声母卡片将通过JavaScript生成 -->
            </div>
        </div>

        <div id="yunmu" class="content">
            <div class="cards-grid" id="yunmu-grid">
                <!-- 韵母卡片将通过JavaScript生成 -->
            </div>
        </div>
    </div>

    <script>
        // 声母数据
        const shengmuData = [
            {pinyin: 'b', example: '爸爸'},
            {pinyin: 'p', example: '苹果'},
            {pinyin: 'm', example: '妈妈'},
            {pinyin: 'f', example: '飞机'},
            {pinyin: 'd', example: '大象'},
            {pinyin: 't', example: '兔子'},
            {pinyin: 'n', example: '牛奶'},
            {pinyin: 'l', example: '老虎'},
            {pinyin: 'g', example: '哥哥'},
            {pinyin: 'k', example: '开心'},
            {pinyin: 'h', example: '花朵'},
            {pinyin: 'j', example: '鸡蛋'},
            {pinyin: 'q', example: '气球'},
            {pinyin: 'x', example: '西瓜'},
            {pinyin: 'zh', example: '竹子'},
            {pinyin: 'ch', example: '吃饭'},
            {pinyin: 'sh', example: '狮子'},
            {pinyin: 'r', example: '日出'},
            {pinyin: 'z', example: '桌子'},
            {pinyin: 'c', example: '草地'},
            {pinyin: 's', example: '太阳'},
            {pinyin: 'y', example: '月亮'},
            {pinyin: 'w', example: '我们'}
        ];

        // 韵母数据
        const yunmuData = [
            {pinyin: 'a', example: '阿姨'},
            {pinyin: 'o', example: '哦'},
            {pinyin: 'e', example: '鹅'},
            {pinyin: 'i', example: '衣服'},
            {pinyin: 'u', example: '乌鸦'},
            {pinyin: 'ü', example: '鱼'},
            {pinyin: 'ai', example: '爱心'},
            {pinyin: 'ei', example: '杯子'},
            {pinyin: 'ui', example: '水'},
            {pinyin: 'ao', example: '猫'},
            {pinyin: 'ou', example: '狗'},
            {pinyin: 'iu', example: '牛'},
            {pinyin: 'ie', example: '叶子'},
            {pinyin: 'üe', example: '月'},
            {pinyin: 'er', example: '儿子'},
            {pinyin: 'an', example: '山'},
            {pinyin: 'en', example: '门'},
            {pinyin: 'in', example: '心'},
            {pinyin: 'un', example: '云'},
            {pinyin: 'ün', example: '云'},
            {pinyin: 'ang', example: '糖'},
            {pinyin: 'eng', example: '灯'},
            {pinyin: 'ing', example: '星'},
            {pinyin: 'ong', example: '虫'}
        ];

        // 音频播放功能
        let currentAudio = null;

        // 播放拼音发音
        function playPinyin(pinyin) {
            // 停止当前播放的音频
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }

            // 尝试播放预录制的音频文件
            const audioPath = `audio/${pinyin}.mp3`;
            currentAudio = new Audio(audioPath);

            // 设置音频属性
            currentAudio.preload = 'auto';
            currentAudio.volume = 1.0;

            currentAudio.onloadstart = function() {
                console.log(`正在加载音频: ${audioPath}`);
            };

            currentAudio.oncanplay = function() {
                console.log(`音频可以播放: ${audioPath}`);
            };

            currentAudio.onplay = function() {
                console.log(`开始播放音频: ${audioPath}`);
            };

            currentAudio.onerror = function(e) {
                console.warn(`音频文件加载失败: ${audioPath}`, e);
                playPinyinWithTTS(pinyin);
            };

            // 尝试播放音频
            const playPromise = currentAudio.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log(`音频播放成功: ${audioPath}`);
                }).catch(error => {
                    console.warn('音频播放被阻止，尝试备用方案:', error.message);
                    // 如果是用户交互策略问题，显示提示
                    if (error.name === 'NotAllowedError') {
                        showAudioPermissionTip();
                    } else {
                        playPinyinWithTTS(pinyin);
                    }
                });
            }
        }

        // 备用TTS方案（改进的Web Speech API）
        function playPinyinWithTTS(pinyin) {
            if (!window.speechSynthesis) {
                showAudioTip();
                return;
            }

            speechSynthesis.cancel();

            // 对特殊拼音进行处理，使发音更准确
            let processedPinyin = processPinyinForTTS(pinyin);

            const utterance = new SpeechSynthesisUtterance(processedPinyin);

            // 获取最佳中文语音
            const voices = speechSynthesis.getVoices();
            const chineseVoice = voices.find(voice =>
                voice.lang === 'zh-CN' ||
                voice.lang === 'zh' ||
                voice.name.includes('Chinese') ||
                voice.name.includes('中文') ||
                voice.name.includes('Mandarin')
            );

            if (chineseVoice) {
                utterance.voice = chineseVoice;
            }

            utterance.lang = 'zh-CN';
            utterance.rate = 0.6;  // 更慢的语速
            utterance.pitch = 1.1; // 适中的音调
            utterance.volume = 1;

            speechSynthesis.speak(utterance);
        }

        // 处理拼音以改善TTS发音
        function processPinyinForTTS(pinyin) {
            const pinyinMap = {
                'zh': '知',
                'ch': '吃',
                'sh': '诗',
                'r': '日',
                'z': '资',
                'c': '次',
                's': '思',
                'ü': '鱼',
                'üe': '月',
                'ün': '云',
                'er': '儿'
            };

            return pinyinMap[pinyin] || pinyin;
        }

        // 显示音频权限提示
        function showAudioPermissionTip() {
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #ff9800;
                color: white;
                padding: 20px;
                border-radius: 10px;
                font-size: 1.1rem;
                text-align: center;
                z-index: 1000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
                max-width: 400px;
            `;
            tip.innerHTML = `
                <div>🔊 需要音频播放权限</div>
                <div style="font-size: 0.9rem; margin: 15px 0;">
                    浏览器阻止了自动音频播放。<br>
                    请点击下面的按钮启用音频播放功能。
                </div>
                <button onclick="enableAudio(this.parentElement)"
                        style="margin: 10px 5px; padding: 10px 20px; border: none;
                               border-radius: 5px; background: white; color: #ff9800;
                               cursor: pointer; font-weight: bold;">
                    启用音频播放
                </button>
                <button onclick="this.parentElement.remove()"
                        style="margin: 10px 5px; padding: 10px 20px; border: none;
                               border-radius: 5px; background: rgba(255,255,255,0.3); color: white;
                               cursor: pointer;">
                    稍后再说
                </button>
            `;
            document.body.appendChild(tip);
        }

        // 启用音频播放
        function enableAudio(tipElement) {
            // 播放一个静音音频来获取播放权限
            const silentAudio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmGgU7k9n1unEiBC13yO/eizEIHWq+8+OWT');
            silentAudio.volume = 0;
            silentAudio.play().then(() => {
                console.log('音频播放权限已获取');
                tipElement.remove();
                // 显示成功提示
                const successTip = document.createElement('div');
                successTip.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: #4CAF50;
                    color: white;
                    padding: 15px;
                    border-radius: 8px;
                    z-index: 1000;
                    font-weight: bold;
                `;
                successTip.textContent = '✅ 音频播放已启用！现在可以点击拼音卡片听发音了';
                document.body.appendChild(successTip);
                setTimeout(() => successTip.remove(), 3000);
            }).catch(error => {
                console.error('无法获取音频播放权限:', error);
            });
        }

        // 显示音频提示
        function showAudioTip() {
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #ff6b6b;
                color: white;
                padding: 20px;
                border-radius: 10px;
                font-size: 1.1rem;
                text-align: center;
                z-index: 1000;
                box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            `;
            tip.innerHTML = `
                <div>🔊 音频功能需要音频文件支持</div>
                <div style="font-size: 0.9rem; margin-top: 10px;">
                    请在项目根目录创建 audio 文件夹，<br>
                    并添加对应的拼音音频文件（如 a.mp3, b.mp3 等）
                </div>
                <button onclick="this.parentElement.remove()"
                        style="margin-top: 15px; padding: 8px 16px; border: none;
                               border-radius: 5px; background: white; color: #ff6b6b;
                               cursor: pointer; font-weight: bold;">
                    知道了
                </button>
            `;
            document.body.appendChild(tip);

            setTimeout(() => {
                if (tip.parentElement) {
                    tip.remove();
                }
            }, 5000);
        }

        // 创建卡片
        function createCard(data) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="pinyin">${data.pinyin}</div>
                <div class="example">${data.example}</div>
            `;

            card.addEventListener('click', function() {
                // 添加点击动画
                card.classList.add('clicked');
                setTimeout(() => {
                    card.classList.remove('clicked');
                }, 600);

                // 播放发音
                playPinyin(data.pinyin);
            });

            return card;
        }

        // 渲染卡片网格
        function renderCards(data, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            data.forEach(item => {
                const card = createCard(item);
                container.appendChild(card);
            });
        }

        // 切换标签页
        function switchTab(tabName) {
            // 更新标签按钮状态
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // 更新内容显示
            document.querySelectorAll('.content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
        }

        // 初始化游戏
        function initGame() {
            // 渲染声母和韵母卡片
            renderCards(shengmuData, 'shengmu-grid');
            renderCards(yunmuData, 'yunmu-grid');

            // 预加载语音引擎
            if (window.speechSynthesis) {
                speechSynthesis.getVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = () => {
                        speechSynthesis.getVoices();
                    };
                }
            }

            // 预初始化音频上下文（用户交互后）
            document.addEventListener('click', initAudioContext, { once: true });
            document.addEventListener('touchstart', initAudioContext, { once: true });

            console.log('拼音学习游戏初始化完成！');

            // 显示音频使用提示
            showInitialTip();
        }

        // 初始化音频上下文
        function initAudioContext() {
            // 创建一个静音音频来初始化音频上下文
            const silentAudio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUarm7blmGgU7k9n1unEiBC13yO/eizEIHWq+8+OWT');
            silentAudio.volume = 0;
            silentAudio.play().then(() => {
                console.log('音频上下文已初始化');
            }).catch(error => {
                console.log('音频上下文初始化失败，这是正常的');
            });
        }

        // 显示初始使用提示
        function showInitialTip() {
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: linear-gradient(45deg, #4CAF50, #45a049);
                color: white;
                padding: 15px;
                border-radius: 10px;
                font-size: 0.9rem;
                max-width: 300px;
                z-index: 1000;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                animation: slideIn 0.5s ease;
            `;
            tip.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 8px;">💡 使用提示</div>
                <div>为获得最佳发音效果，建议添加拼音音频文件到 audio/ 文件夹</div>
                <button onclick="this.parentElement.remove()"
                        style="margin-top: 10px; padding: 5px 10px; border: none;
                               border-radius: 3px; background: white; color: #4CAF50;
                               cursor: pointer; font-size: 0.8rem;">
                    知道了
                </button>
            `;

            // 添加动画样式
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);

            document.body.appendChild(tip);

            setTimeout(() => {
                if (tip.parentElement) {
                    tip.style.animation = 'slideIn 0.5s ease reverse';
                    setTimeout(() => tip.remove(), 500);
                }
            }, 8000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initGame();
        });

        // 添加触摸设备支持
        if ('ontouchstart' in window) {
            document.addEventListener('touchstart', function() {}, {passive: true});
        }
    </script>
</body>
</html>
