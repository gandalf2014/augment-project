            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </symbol>
    </svg>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/><line x1='16' y1='13' x2='8' y2='13'/><line x1='16' y1='17' x2='8' y2='17'/></svg>">
</head>
<body>
    <a href="#main-content" class="skip-link">跳转到主内容</a>

    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon icon"><use href="#icon-note"/></svg>
                    <h1>Memo</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-icon view-toggle" onclick="toggleViewMode()" aria-label="切换视图">
                        <svg class="icon"><use href="#icon-list"/></svg>
                    </button>
                    <button class="btn btn-icon" id="themeToggle" aria-label="切换主题">
                        <svg class="icon theme-icon"><use href="#icon-sun"/></svg>
                    </button>
                    <button class="btn btn-icon" id="exportBtn" aria-label="导出">
                        <svg class="icon"><use href="#icon-upload"/></svg>
                    </button>
                    <a href="/settings.html" class="btn btn-icon" aria-label="设置">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </a>
                    <button class="btn btn-outline" id="logoutBtn" onclick="logout()" title="退出登录">
                        退出
                    </button>
                    <button class="btn btn-primary" id="newMemoBtn">
                        <span>+</span> 新建
                    </button>
                </div>
            </div>
        </header>

        <!-- Search Bar -->
        <div class="search-bar">
            <div class="search-bar-inner">
                <div class="search-spacer"></div>
                <div class="search-container">
                    <label for="searchInput" class="visually-hidden">搜索</label>
                    <input type="text" id="searchInput" placeholder="搜索备忘录..." class="search-input">
                    <button class="search-clear" id="searchClear" aria-label="清除" style="display: none;">×</button>
                </div>
                <div class="filter-container">
                    <select id="tagFilter" class="tag-filter" aria-label="标签筛选">
                        <option value="">全部标签</option>
                    </select>
                    <button class="btn btn-outline" id="favoritesFilter">
                        <svg class="icon"><use href="#icon-star"/></svg>
                        收藏
                    </button>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <main class="main" id="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-number" id="totalMemos">0</span>
                        <span class="stat-label">备忘录</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="totalTags">0</span>
                        <span class="stat-label">标签</span>
                    </div>
                </div>

                <div id="notebooksList" class="notebooks-list"></div>

                <!-- Saved Filters Section -->
                <div class="saved-filters-section" id="savedFiltersSection">
                    <h2>已保存的筛选</h2>
                    <div class="saved-filters-list" id="savedFiltersList"></div>
                    <button class="btn btn-outline btn-small btn-block" id="saveFilterBtn" onclick="openSaveFilterModal()">
                        + 保存当前筛选
                    </button>
                </div>

                <!-- Stats Link -->
                <div class="sidebar-section">
                    <a href="/stats.html" class="sidebar-link">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 20V10M12 20V4M6 20v-6"/>
                        </svg>
                        数据洞察
                    </a>
                </div>

                <div class="tags-section">
                    <h2>标签</h2>
                    <div class="tags-list" id="tagsList"></div>
                    <button class="btn btn-outline btn-small" id="newTagBtn">+ 新标签</button>
                </div>
            </aside>

            <!-- Memos Grid - Masonry Layout -->
            <div class="content">
                <div class="memos-grid" id="memosGrid" role="list"></div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">
                        <svg class="icon large"><use href="#icon-note"/></svg>
                    </div>
                    <h3>还没有备忘录</h3>
                    <p>创建你的第一条备忘录开始吧！</p>
                    <button class="btn btn-primary" style="margin-top: 1rem;" onclick="openMemoModal()">创建备忘录</button>
                </div>
            </div>
        </main>

        <!-- Batch operation bar -->
        <div class="batch-bar" id="batchBar" style="display: none;">
            <span id="batchCount">已选择 0 个</span>
            <button class="btn btn-outline btn-small" onclick="selectAllMemos()">全选</button>
            <button class="btn btn-outline btn-small" onclick="clearSelection()">取消</button>
        </div>

        <!-- Batch context menu -->
        <div class="context-menu" id="batchContextMenu" style="display: none;">
            <div class="context-item" onclick="batchMoveToNotebook()">移动到笔记本...</div>
            <div class="context-item" onclick="batchArchive()">归档所选</div>
            <div class="context-item" onclick="batchModifyTags()">修改标签...</div>
            <div class="context-item danger" onclick="batchDelete()">删除所选</div>
            <div class="context-divider"></div>
            <div class="context-item" onclick="clearSelection()">取消选择</div>
        </div>
    </div>

    <!-- Memo Modal -->
    <div class="modal" id="memoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">新建备忘录</h2>
                <div class="modal-header-actions">
                    <button type="button" class="btn-icon" id="versionHistoryBtn" style="display: none;" title="历史版本">
                        <svg class="icon small"><use href="#icon-clock"/></svg>
                    </button>
                    <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
                </div>
            </div>
            <form id="memoForm" class="modal-body">
                <div class="form-group">
                    <label for="memoTitle">标题 <span class="optional">(可选)</span></label>
                    <input type="text" id="memoTitle" placeholder="留空将自动生成...">
                </div>
                <div class="form-group">
                    <label for="memoContent">内容 <span class="required">*</span></label>
                    <div class="editor-tabs">
                        <button type="button" class="editor-tab active" data-tab="write">
                            <svg class="icon small"><use href="#icon-edit"/></svg> 编辑
                        </button>
                        <button type="button" class="editor-tab" data-tab="preview">
                            <svg class="icon small"><use href="#icon-eye"/></svg> 预览
                        </button>
                    </div>
                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" onclick="insertMd('**', '**')" title="粗体"><strong>B</strong></button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('*', '*')" title="斜体"><em>I</em></button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('`', '`')" title="代码">&lt;/&gt;</button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('[', '](url)')" title="链接">
                            <svg class="icon small"><use href="#icon-link"/></svg>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('- ', '')" title="列表">•</button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('> ', '')" title="引用">
                            <svg class="icon small"><use href="#icon-quote"/></svg>
                        </button>
                        <button type="button" class="toolbar-btn" onclick="insertMd('# ', '')" title="标题">H</button>
                        <button type="button" class="toolbar-btn template-btn" onclick="openTemplateSelector()" title="模板">
                            <svg class="icon small"><use href="#icon-file"/></svg>
                        </button>
                    </div>
                    <div class="editor-content">
                        <textarea id="memoContent" required placeholder="支持 Markdown 格式..." rows="8"></textarea>
                        <div id="markdownPreview" class="markdown-preview" style="display: none;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="memoTags">标签</label>
                    <input type="text" id="memoTags" placeholder="标签用逗号分隔...">
                    <div class="available-tags" id="availableTags"></div>
                </div>
                <div class="form-group">
                    <label for="memoNotebook">笔记本</label>
                    <select id="memoNotebook" class="notebook-select">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="memoFavorite">
                        <span class="checkmark"></span>
                        <span>标记为收藏</span>
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="cancelBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Tag Modal -->
    <div class="modal" id="tagModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>新建标签</h2>
                <button class="modal-close" onclick="closeTagModal()" aria-label="关闭">×</button>
            </div>
            <form id="tagForm" class="modal-body">
                <div class="form-group">
                    <label for="tagName">标签名称 <span class="required">*</span></label>
                    <input type="text" id="tagName" required placeholder="输入标签名称...">
                </div>
                <div class="form-group">
                    <label for="tagColor">颜色</label>
                    <div class="color-picker">
                        <input type="color" id="tagColor" value="#3b82f6">
                        <div class="color-presets">
                            <button type="button" class="color-preset" data-color="#dc2626" style="background: #dc2626;"></button>
                            <button type="button" class="color-preset" data-color="#059669" style="background: #059669;"></button>
                            <button type="button" class="color-preset" data-color="#d97706" style="background: #d97706;"></button>
                            <button type="button" class="color-preset" data-color="#7c3aed" style="background: #7c3aed;"></button>
                            <button type="button" class="color-preset" data-color="#0891b2" style="background: #0891b2;"></button>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeTagModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notebook Modal -->
    <div class="modal" id="notebookModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2 id="notebookModalTitle">新建笔记本</h2>
                <button class="modal-close" onclick="closeNotebookModal()" aria-label="关闭">×</button>
            </div>
            <form id="notebookForm" class="modal-body">
                <div class="form-group">
                    <label for="notebookName">笔记本名称 <span class="required">*</span></label>
                    <input type="text" id="notebookName" required placeholder="输入笔记本名称..." maxlength="50">
                </div>
                <div class="form-group">
                    <label for="notebookIcon">图标</label>
                    <input type="text" id="notebookIcon" value="📁" maxlength="10" class="icon-input">
                    <div class="icon-presets">
                        <button type="button" class="icon-preset" data-icon="📁">📁</button>
                        <button type="button" class="icon-preset" data-icon="💼">💼</button>
                        <button type="button" class="icon-preset" data-icon="📚">📚</button>
                        <button type="button" class="icon-preset" data-icon="🏠">🏠</button>
                        <button type="button" class="icon-preset" data-icon="💡">💡</button>
                        <button type="button" class="icon-preset" data-icon="🎯">🎯</button>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeNotebookModal()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Restore Modal -->
    <div class="modal" id="restoreModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>恢复到笔记本</h2>
                <button class="modal-close" onclick="closeRestoreModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="restoreNotebook">选择目标笔记本</label>
                    <select id="restoreNotebook" class="restore-select">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeRestoreModal()">取消</button>
                    <button type="button" class="btn btn-primary" onclick="confirmRestore()">恢复</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Save Filter Modal -->
    <div class="modal" id="saveFilterModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>保存筛选预设</h2>
                <button class="modal-close" onclick="closeSaveFilterModal()" aria-label="关闭">×</button>
            </div>
            <form id="saveFilterForm" class="modal-body">
                <div class="form-group">
                    <label for="filterName">名称 <span class="required">*</span></label>
                    <input type="text" id="filterName" required placeholder="输入预设名称..." maxlength="50">
                </div>
                <div class="form-group">
                    <label>图标</label>
                    <div class="icon-presets">
                        <button type="button" class="icon-preset selected" data-icon="⭐">⭐</button>
                        <button type="button" class="icon-preset" data-icon="📋">📋</button>
                        <button type="button" class="icon-preset" data-icon="🔔">🔔</button>
                        <button type="button" class="icon-preset" data-icon="📌">📌</button>
                        <button type="button" class="icon-preset" data-icon="💼">💼</button>
                        <button type="button" class="icon-preset" data-icon="🎯">🎯</button>
                    </div>
                    <input type="hidden" id="filterIcon" value="⭐">
                </div>
                <div class="form-group">
                    <label>当前条件</label>
                    <div id="filterConditions" class="filter-conditions-preview"></div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeSaveFilterModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Batch Tags Modal -->
    <div class="modal" id="batchTagsModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>批量修改标签</h2>
                <button class="modal-close" onclick="closeBatchTagsModal()" aria-label="关闭">×</button>
            </div>
            <form id="batchTagsForm" class="modal-body">
                <div class="form-group">
                    <label>修改方式</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="tagMode" value="add" checked>
                            <span>追加标签</span>
                            <small class="radio-hint">在现有标签后添加新标签</small>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="tagMode" value="replace">
                            <span>替换标签</span>
                            <small class="radio-hint">清除现有标签，只保留新标签</small>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="tagMode" value="remove">
                            <span>移除标签</span>
                            <small class="radio-hint">从现有标签中删除指定标签</small>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="batchTagsInput">标签</label>
                    <input type="text" id="batchTagsInput" placeholder="输入标签，逗号分隔..." maxlength="200">
                    <small class="form-hint">已选择 <span id="batchAffectedCount">0</span> 个备忘录</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" onclick="closeBatchTagsModal()">取消</button>
                    <button type="submit" class="btn btn-primary">确认修改</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
    </div>

    <!-- Template Modal -->
    <div class="modal" id="templateModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>选择模板</h2>
                <button class="modal-close" onclick="closeTemplateSelector()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div id="templateSelector" class="template-selector"></div>
            </div>
        </div>
    </div>

    <!-- Version History Modal -->
    <div class="modal" id="versionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>历史版本</h2>
                <button class="modal-close" onclick="closeVersionModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div id="versionList" class="version-list">
                    <div class="loading">加载中...</div>
                </div>
                <div id="versionPreview" class="version-preview" style="display: none;">
                    <h3 id="versionPreviewTitle"></h3>
                    <div id="versionPreviewContent" class="markdown-preview"></div>
                    <div class="version-actions">
                        <button type="button" class="btn btn-outline" onclick="closeVersionPreview()">取消</button>
                        <button type="button" class="btn btn-primary" onclick="restoreVersion()">恢复此版本</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal" id="shareNotebookModal">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>共享笔记本</h2>
                <button class="modal-close" onclick="closeShareModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div id="shareStatus" class="share-status">
                    <p class="share-info">创建共享链接后，其他人可以查看此笔记本中的所有备忘录（只读）。</p>
                </div>
                <div id="shareLinkContainer" style="display: none;">
                    <div class="share-link-box">
                        <input type="text" id="shareLinkInput" readonly>
                        <button type="button" class="btn btn-outline" onclick="copyShareLink()">复制</button>
                    </div>
                    <p class="share-meta">
                        <span id="shareViewCount"></span>
                        <button type="button" class="btn-text" onclick="revokeShare()">撤销共享</button>
                    </p>
                </div>
                <div class="form-group">
                    <label for="shareExpires">过期时间</label>
                    <select id="shareExpires">
                        <option value="">永不过期</option>
                        <option value="1">1 天后</option>
                        <option value="7">7 天后</option>
                        <option value="30">30 天后</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" onclick="closeShareModal()">取消</button>
                <button type="button" class="btn btn-primary" id="shareCreateBtn" onclick="createShare()">创建共享</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Script execution -->
    <script src="script.js"></script>
</body>
</html>
