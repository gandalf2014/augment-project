<h2>你最想增强哪个方向？</h2>
<p class="subtitle">这会决定我们优先探索哪些功能</p>

<div class="options">
  <div class="option" data-choice="efficiency" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>效率工具</h3>
      <p>快捷操作、批量处理、模板、快速捕捉、键盘优先</p>
    </div>
  </div>
  <div class="option" data-choice="organization" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>组织整理</h3>
      <p>文件夹/分组、智能分类、归档、时间线视图、关系链接</p>
    </div>
  </div>
  <div class="option" data-choice="content" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>内容增强</h3>
      <p>图片附件、语音转文字、AI 摘要、双向链接、知识图谱</p>
    </div>
  </div>
  <div class="option" data-choice="sync" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>同步与共享</h3>
      <p>多设备同步、分享链接、协作编辑、导入导出增强</p>
    </div>
  </div>
</div>

<p style="margin-top: 2rem; color: var(--text-secondary);">点击选择你最有兴趣的方向，或者告诉我其他想法</p>
