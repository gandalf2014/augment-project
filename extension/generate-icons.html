<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo 扩展图标生成器</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #1e293b;
      color: #f8fafc;
    }
    h1 { color: #2563eb; }
    .icon-preview {
      display: flex;
      gap: 20px;
      margin: 20px 0;
    }
    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .icon-item canvas {
      background: white;
      border-radius: 8px;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #1d4ed8; }
    .instructions {
      background: #334155;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .instructions code {
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Memo 扩展图标生成器</h1>
  
  <div class="icon-preview" id="iconPreview"></div>
  
  <button onclick="downloadAll()">下载所有图标</button>
  
  <div class="instructions">
    <h3>使用说明</h3>
    <ol>
      <li>点击"下载所有图标"按钮</li>
      <li>将下载的 PNG 文件放入 <code>extension/icons/</code> 目录</li>
      <li>文件名应保持为 <code>icon-16.png</code>、<code>icon-48.png</code>、<code>icon-128.png</code></li>
    </ol>
  </div>
  
  <script>
    const sizes = [16, 48, 128];
    
    function drawIcon(ctx, size) {
      const scale = size / 128;
      
      // Background
      ctx.fillStyle = '#2563eb';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.15);
      ctx.fill();
      
      // Document shape
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.roundRect(size * 0.2, size * 0.15, size * 0.55, size * 0.7, size * 0.05);
      ctx.fill();
      
      // Fold corner
      ctx.fillStyle = '#e2e8f0';
      ctx.beginPath();
      ctx.moveTo(size * 0.55, size * 0.15);
      ctx.lineTo(size * 0.75, size * 0.35);
      ctx.lineTo(size * 0.55, size * 0.35);
      ctx.closePath();
      ctx.fill();
      
      // Lines on document
      ctx.strokeStyle = '#2563eb';
      ctx.lineWidth = size * 0.03;
      ctx.lineCap = 'round';
      
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.45);
      ctx.lineTo(size * 0.6, size * 0.45);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.58);
      ctx.lineTo(size * 0.6, size * 0.58);
      ctx.stroke();
      
      ctx.beginPath();
      ctx.moveTo(size * 0.3, size * 0.71);
      ctx.lineTo(size * 0.5, size * 0.71);
      ctx.stroke();
    }
    
    function generateIcons() {
      const preview = document.getElementById('iconPreview');
      
      sizes.forEach(size => {
        const container = document.createElement('div');
        container.className = 'icon-item';
        
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        
        const ctx = canvas.getContext('2d');
        drawIcon(ctx, size);
        
        const label = document.createElement('span');
        label.textContent = `${size}×${size}`;
        
        container.appendChild(canvas);
        container.appendChild(label);
        preview.appendChild(container);
      });
    }
    
    function downloadAll() {
      sizes.forEach(size => {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        
        const ctx = canvas.getContext('2d');
        drawIcon(ctx, size);
        
        const link = document.createElement('a');
        link.download = `icon-${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
    
    // Initialize
    generateIcons();
  </script>
</body>
</html>
